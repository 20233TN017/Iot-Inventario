<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    text-align: center;
    padding: 15px;
    background: #1e293b;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

.total {
    font-size: 50px;
    color: #38bdf8;
}

button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.add { background: #22c55e; }
.remove { background: #ef4444; }

.historial {
    max-height: 200px;
    overflow-y: auto;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="header">
    📦 Dashboard de Inventario
</div>

<div class="container">

    <!-- INVENTARIO -->
    <div class="card">
        <h2>Total</h2>
        <div id="total" class="total">0</div>

        <button class="add" onclick="agregar()">➕ Agregar</button>
        <button class="remove" onclick="remover()">➖ Quitar</button>
    </div>

    <!-- HISTORIAL -->
    <div class="card">
        <h2>Historial</h2>
        <div id="historial" class="historial"></div>
    </div>

    <!-- GRÁFICA -->
    <div class="card" style="grid-column: span 2;">
        <h2>Gráfica en tiempo real</h2>
        <canvas id="grafica"></canvas>
    </div>

</div>

<script>
let chart;
let datos = [];

async function obtenerDatos() {
    const res = await fetch("http://127.0.0.1:5000/data");
    const data = await res.json();

    document.getElementById("total").innerText = data.total;

    // historial
    const histDiv = document.getElementById("historial");
    histDiv.innerHTML = data.historial.map(h => `<div>${h}</div>`).join("");

    // gráfica
    datos.push(data.total);
    if (datos.length > 10000) datos.shift();

    chart.data.labels = datos.map((_, i) => i);
    chart.data.datasets[0].data = datos;
    chart.update();
}

// botones
async function agregar() {
    await fetch("http://127.0.0.1:5000/add", { method: "POST" });
}

async function remover() {
    await fetch("http://127.0.0.1:5000/remove", { method: "POST" });
}

// iniciar gráfica
window.onload = () => {
    const ctx = document.getElementById('grafica');
   chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Inventario',
            data: [],
            borderWidth: 2,
            tension: 0.4,
            pointRadius: 2,
            fill: true
        }]
    },
    options: {   // 👈 AQUÍ VA
        scales: {
            x: {
                ticks: {
                    autoSkip: false,
                    maxTicksLimit: 10
                }
            }
        }
    }
});

    setInterval(obtenerDatos, 1000);
}
</script>

</body>
</html>
