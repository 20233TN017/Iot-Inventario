<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tareas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:25px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:8px 12px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3a8be0;
}

ul{
    list-style:none;
    padding:0;
    margin-top:15px;
}

li{
    background:#f4f4f4;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration: line-through;
    color:gray;
}

.delete{
    background:red;
    padding:4px 8px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">
<h1>Mi Lista</h1>

<div class="input-group">
<input id="taskInput" type="text" placeholder="Nueva tarea...">
<button onclick="addTask()">Agregar</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if(text === "") return;

    let li = document.createElement("li");

    li.innerHTML = `
        <span onclick="toggleTask(this)">${text}</span>
        <button class="delete" onclick="deleteTask(this)">X</button>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value="";
}

function toggleTask(element){
    element.classList.toggle("completed");
}

function deleteTask(button){
    button.parentElement.remove();
}

</script>

</body>
</html>
