<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Reacción</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
}

h1{
    margin-top:40px;
}

#gameBox{
    width:300px;
    height:300px;
    background:red;
    margin:50px auto;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#00c3ff;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}

#result{
    font-size:22px;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>⚡ Test de Tiempo de Reacción</h1>

<p>Haz clic en el botón y espera a que el cuadro se ponga verde.</p>
<p>Cuando cambie a verde, haz clic lo más rápido posible.</p>

<button onclick="startGame()">Comenzar</button>

<div id="gameBox"></div>

<div id="result"></div>

<script>

let startTime;
let waiting = false;

function startGame(){

    document.getElementById("result").innerText = "Espera...";
    document.getElementById("gameBox").style.background = "red";

    waiting = true;

    let randomTime = Math.random()*3000 + 2000;

    setTimeout(function(){

        document.getElementById("gameBox").style.background = "lime";
        startTime = new Date().getTime();
        waiting = false;

    }, randomTime);
}

document.getElementById("gameBox").onclick = function(){

    if(waiting){
        document.getElementById("result").innerText = "⛔ Muy pronto! Espera el color verde.";
        return;
    }

    if(this.style.background === "lime"){

        let endTime = new Date().getTime();
        let reaction = endTime - startTime;

        document.getElementById("result").innerText =
        "⚡ Tu tiempo de reacción: " + reaction + " ms";

        this.style.background = "red";
    }

}

</script>

</body>
</html>
